<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slides: loop – baroview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; padding: 1rem; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    baro-view { display: block; width: 100%; height: 420px; border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #222; }
  </style>
</head>
<body>
  <h1>Slides: loop</h1>
  <p style="font-size: 0.875rem; color: #999; margin-bottom: 1rem;">Arrows always visible; from last → next goes to first, from first → prev goes to last.</p>
  <baro-view
    urls="/demo.svg /demo.md /demo.pdf"
    layout="gallery"
    gallery-style="slides"
    slides-loop
    slides-height="380"
    slides-fullscreen
  ></baro-view>
  <script type="module" src="/main.js"></script>
</body>
</html>
