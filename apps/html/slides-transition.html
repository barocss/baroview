<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slides: transition – baroview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; padding: 1rem; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    section { margin-bottom: 2rem; }
    baro-view { display: block; width: 100%; height: 360px; border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #222; }
  </style>
</head>
<body>
  <h1>Slides: transition</h1>
  <section>
    <h2 style="font-size: 1rem;">Fade</h2>
    <baro-view
      urls="/demo.svg /demo.md /demo.pdf"
      layout="gallery"
      gallery-style="slides"
      slides-transition="fade"
      slides-height="320"
    ></baro-view>
  </section>
  <section>
    <h2 style="font-size: 1rem;">Slide</h2>
    <baro-view
      urls="/demo.svg /demo.md /demo.pdf"
      layout="gallery"
      gallery-style="slides"
      slides-transition="slide"
      slides-height="320"
    ></baro-view>
  </section>
  <script type="module" src="/main.js"></script>
</body>
</html>
