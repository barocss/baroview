<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Slides: deep link (CDN) – baroview</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; padding: 1rem; background: #1a1a1a; color: #eee; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .intro { font-size: 0.875rem; color: #999; margin-bottom: 1rem; }
    baro-view { display: block; width: 100%; height: 420px; border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #222; }
  </style>
</head>
<body>
  <h1>Slides: deep link – CDN</h1>
  <p class="intro">URL updates to #slide=N. Try <a href="#slide=2">#slide=2</a>. <a href="/slides-samples-cdn.html">← CDN samples</a></p>
  <baro-view
    urls="/demo.svg /demo.md /demo.pdf /demo.svg"
    layout="gallery"
    gallery-style="slides"
    slides-deep-link
    slides-height="380"
    slides-fullscreen
  ></baro-view>
  <script type="module" src="/baroview-cdn.js"></script>
</body>
</html>
